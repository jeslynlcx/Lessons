<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model Example</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background-color: rgb(208, 232, 239);
            padding: 10px;
            border: 5px solid rgb(0, 0, 0);
            margin: 15px;
            margin-left: 20px;
            border-radius: 20px 10px 30px 40px;
        }

    </style>
</head>
<body>
    <div class="box">some heading</div>
</body>
</html>
